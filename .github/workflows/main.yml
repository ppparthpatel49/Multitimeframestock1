name: TDMB Premium Scan
on:
  schedule:
    - cron: '50 9 * * 5' # Friday 15:20 IST
    - cron: '30 4 * * 0' # Sunday 10:00 IST
    - cron: '45 3 * * 1' # Monday 09:15 IST
  workflow_dispatch:
    inputs:
      universe_mode:
        description: 'Universe to scan'
        required: true
        default: 'nifty500'
        type: choice
        options:
          - nifty500
          - nifty200
          - custom

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # <--- UPDATED from 3.10 to 3.12 to support pandas-ta
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Premium Scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python python/main.py --universe ${{ github.event.inputs.universe_mode || 'nifty500' }} --token $TELEGRAM_TOKEN --chat-id $TELEGRAM_CHAT_ID
